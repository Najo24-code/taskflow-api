<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow Sistema De Gestion De Proyectos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3B82F6', secondary: '#1E40AF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 m-4">
            <div id="login-form">
                <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Iniciar Sesión</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="login-email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                            placeholder="tu@email.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                        <input type="password" id="login-password" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                            placeholder="••••••••">
                    </div>
                    <button type="submit"
                        class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl">
                        Iniciar Sesión
                    </button>
                </form>
                <p class="text-center text-gray-600 mt-6">
                    ¿No tienes cuenta? 
                    <button onclick="showRegister()" class="text-primary hover:text-secondary font-medium">Regístrate</button>
                </p>
            </div>
            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Crear Cuenta</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre</label>
                        <input type="text" id="register-name" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                            placeholder="Tu nombre">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="register-email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                            placeholder="tu@email.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                        <input type="password" id="register-password" required minlength="6"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit"
                        class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl">
                        Crear Cuenta
                    </button>
                </form>
                <p class="text-center text-gray-600 mt-6">
                    ¿Ya tienes cuenta? 
                    <button onclick="showLogin()" class="text-primary hover:text-secondary font-medium">Inicia sesión</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">Taskflow Sistema De Gestion De Proyectos</h1>
                <div class="flex items-center gap-4">
                    <span id="user-name" class="text-gray-600"></span>
                    <button onclick="handleLogout()" 
                        class="text-gray-500 hover:text-red-600 font-medium transition-colors">
                        Cerrar sesión
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Create Form -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Crear nuevo</h2>
                <form onsubmit="handleCreate(event)" class="grid md:grid-cols-4 gap-4">
                    <input type="text" id="item-title" required placeholder="Título"
                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                    <input type="text" id="item-description" placeholder="Descripción"
                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                    <select id="item-status"
                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                        <option value="pendiente">Pendiente</option>
                        <option value="en_progreso">En progreso</option>
                        <option value="completado">Completado</option>
                    </select>
                    <button type="submit"
                        class="bg-primary hover:bg-secondary text-white font-semibold py-3 px-6 rounded-lg transition-all">
                        + Crear
                    </button>
                </form>
            </div>

            <!-- Items List -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-900">Lista de items</h2>
                </div>
                <div id="items-container" class="divide-y divide-gray-100">
                    <!-- Items loaded here -->
                </div>
                <div id="empty-state" class="hidden p-12 text-center text-gray-500">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <p>No hay items todavía. ¡Crea el primero!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-full opacity-0 transition-all duration-300">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
            <span id="toast-message"></span>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : window.location.origin;
        
        let token = localStorage.getItem('token');
        let currentUser = null;

        // Check auth on load
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                checkAuth();
            }
        });

        async function checkAuth() {
            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    showApp();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
        }

        function showApp() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-name').textContent = currentUser?.email || '';
            loadItems();
        }

        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });
                
                if (res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    await checkAuth();
                    showToast('¡Bienvenido!');
                } else {
                    showToast('Credenciales incorrectas', true);
                }
            } catch (e) {
                showToast('Error de conexión', true);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email.split("@")[0], email, password, name })
                });
                
                if (res.ok) {
                    showToast('Cuenta creada. Inicia sesión.');
                    showLogin();
                } else {
                    const err = await res.json();
                    showToast(err.detail || 'Error al registrar', true);
                }
            } catch (e) {
                showToast('Error de conexión', true);
            }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            showLogin();
        }

        async function loadItems() {
            try {
                const endpoint = API_URL.includes('task') ? '/tasks/' : '/items/';
                const res = await fetch(`${API_URL}${endpoint}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const items = await res.json();
                    renderItems(items);
                }
            } catch (e) {
                console.error('Failed to load items:', e);
            }
        }

        function renderItems(items) {
            const container = document.getElementById('items-container');
            const emptyState = document.getElementById('empty-state');
            
            if (items.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.innerHTML = items.map(item => `
                <div class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                    <div class="flex-1">
                        <h3 class="font-medium text-gray-900">${item.title || item.name}</h3>
                        <p class="text-sm text-gray-500">${item.description || ''}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="px-3 py-1 text-xs font-medium rounded-full ${getStatusClass(item.status || item.state)}">
                            ${item.status || item.state || 'pendiente'}
                        </span>
                        <button onclick="deleteItem(${item.id})" class="text-gray-400 hover:text-red-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusClass(status) {
            const classes = {
                'pendiente': 'bg-yellow-100 text-yellow-800',
                'en_progreso': 'bg-blue-100 text-blue-800',
                'en progreso': 'bg-blue-100 text-blue-800',
                'completado': 'bg-green-100 text-green-800',
                'completada': 'bg-green-100 text-green-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        async function handleCreate(e) {
            e.preventDefault();
            const title = document.getElementById('item-title').value;
            const description = document.getElementById('item-description').value;
            const status = document.getElementById('item-status').value;
            
            try {
                const endpoint = API_URL.includes('task') ? '/tasks/' : '/items/';
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, description, status, state: status })
                });
                
                if (res.ok) {
                    document.getElementById('item-title').value = '';
                    document.getElementById('item-description').value = '';
                    loadItems();
                    showToast('Item creado');
                }
            } catch (e) {
                showToast('Error al crear', true);
            }
        }

        async function deleteItem(id) {
            if (!confirm('¿Eliminar este item?')) return;
            
            try {
                const endpoint = API_URL.includes('task') ? '/tasks/' : '/items/';
                const res = await fetch(`${API_URL}${endpoint}${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    loadItems();
                    showToast('Item eliminado');
                }
            } catch (e) {
                showToast('Error al eliminar', true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.textContent = message;
            toast.querySelector('div').className = `${isError ? 'bg-red-600' : 'bg-gray-900'} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3`;
            toast.classList.remove('translate-y-full', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-full', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
